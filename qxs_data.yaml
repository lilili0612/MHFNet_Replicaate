# 训练集和验证集的图片路径 (由于 MHFNet 是双模态，通常它会在内部自己去加上 /rgb 或 /sar 子目录，这里填到 split 层即可，具体看项目要求)
train: /mnt/sdb/lijing/ImageFusion/ShipDetection/SAR_OPT_datasets/SAR-OPT/MHFNet_dataset/QXS-datasets/dataset_split/images/train
val: /mnt/sdb/lijing/ImageFusion/ShipDetection/SAR_OPT_datasets/SAR-OPT/MHFNet_dataset/QXS-datasets/dataset_split/images/val
test: /mnt/sdb/lijing/ImageFusion/ShipDetection/SAR_OPT_datasets/SAR-OPT/MHFNet_dataset/QXS-datasets/dataset_split/images/test

# 类别数量 (如果是单纯的 Ship Detection 船舶检测，通常是 1 类)
nc: 1

# 类别名称
names: ['ship']